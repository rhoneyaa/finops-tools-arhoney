name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: |
            core/go.sum
            cli/go.sum

      - name: Test
        run: go test ./core/... ./cli/...

      - name: Build
        run: go build -o finops ./cli/cmd/finops
