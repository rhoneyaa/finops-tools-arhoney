{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ template "title" . }}</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --accent: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 2rem; }
    header h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
    .meta { color: var(--muted); font-size: 0.95rem; }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    section h2 {
      margin: 0 0 1rem;
      font-size: 1.15rem;
      color: var(--accent);
    }
    .total-amount {
      font-size: 2rem;
      font-weight: 600;
      margin: 0.25rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 600; }
    td.amount, td.percent { text-align: right; white-space: nowrap; }
    .chart-wrap { position: relative; min-height: 300px; overflow: visible; }
    .daily-chart { width: 100%; height: auto; display: block; overflow: visible; }
    .chart-grid { stroke: var(--border); stroke-width: 1; }
    .chart-line { fill: none; stroke: var(--accent); stroke-width: 2; }
    .chart-area { fill: rgba(9, 105, 218, 0.12); stroke: none; }
    .chart-point { fill: var(--accent); stroke: #fff; stroke-width: 1; }
    .chart-axis { fill: var(--muted); font-size: 11px; font-family: inherit; }
    footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    {{ template "content" . }}
    <footer>Generated by finops-tools</footer>
  </div>
</body>
</html>
{{ end }}
